<section class="profile-page">
  <div class="profile-card">
    <header class="profile-card__header">
      <h1 class="profile-card__title">Profile</h1>
      <p class="profile-card__subtitle">Manage your account details and avatar settings.</p>
    </header>

    <form class="profile-form" [formGroup]="profileForm" (submit)="save()">
      <label class="profile-field">
        <span class="profile-field__label">Display name</span>
        <input class="profile-field__input" type="text" formControlName="displayName" />
      </label>

      <label class="profile-field">
        <span class="profile-field__label">Email</span>
        <input class="profile-field__input" type="email" formControlName="email" />
      </label>

      <label class="profile-field">
        <span class="profile-field__label">Phone number</span>
        <input class="profile-field__input" type="tel" formControlName="phoneNumber" />
      </label>

      <label class="profile-field">
        <span class="profile-field__label">Avatar URL</span>
        <input class="profile-field__input" type="url" formControlName="photoURL" placeholder="https://" />
      </label>

      <footer class="profile-form__actions">
        <button class="profile-form__submit" type="submit" [disabled]="loading()">Save changes</button>
      </footer>
    </form>
  </div>
</section>
